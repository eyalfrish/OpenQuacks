name: Deploy preview (per branch)

# Per-branch preview deploys. Each branch gets its own URL at:
#   https://<owner>.github.io/<repo>/preview/<branch-slug>/
# Production at gh-pages root is never touched.
# If an open PR exists for the branch, posts the preview URL as a
# comment (and updates the same comment on later pushes).

on:
  push:
    branches-ignore:
      - main
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute slug & URL
        id: meta
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          SLUG="$(echo "$BRANCH" | tr '/' '-' | tr -cd 'a-zA-Z0-9-_.')"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/preview/${SLUG}/"
          {
            echo "branch=$BRANCH"
            echo "slug=$SLUG"
            echo "url=$URL"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::Preview URL: $URL"

      - name: Publish to gh-pages /preview/<slug>/
        uses: ./.github/actions/publish-to-gh-pages
        with:
          mode: replace-subdir
          subdir: preview/${{ steps.meta.outputs.slug }}
          commit_message: "Deploy preview: ${{ steps.meta.outputs.slug }}"
          version_info: |
            preview_for: ${{ steps.meta.outputs.branch }}
            commit:      ${{ github.sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment URL on open PR (if any)
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = `${{ steps.meta.outputs.branch }}`;
            const url    = `${{ steps.meta.outputs.url }}`;
            const sha    = context.sha.substring(0, 7);

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (prs.length === 0) {
              console.log(`No open PR for ${branch}; preview URL: ${url}`);
              return;
            }
            const pr = prs[0];
            const marker = '<!-- preview-bot -->';
            const body = `${marker}\n🚀 **Preview deployed** for \`${branch}\` (${sha}):\n\n${url}\n\n_Updates on every push to this branch._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
